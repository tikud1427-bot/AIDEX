<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="game-title">Mobile Game</h1>
        <button id="start-button">Start Game</button>
    </header>
    <main>
        <section id="game-info">
            <h2 id="game-description">A fun mobile game where you can collect coins and power-ups.</h2>
            <p id="game-score">Score: 0</p>
        </section>
        <section id="game-controls">
            <button id="pause-button">Pause Game</button>
            <button id="restart-button">Restart Game</button>
        </section>
        <canvas id="game-canvas" width="400" height="600"></canvas>
    </main>
    <footer>
        <p id="game-copyright">&copy; 2023 Mobile Game</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
