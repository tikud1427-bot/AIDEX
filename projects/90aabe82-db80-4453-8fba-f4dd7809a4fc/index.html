<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Directory</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>AI Directory</h1>
        <p>Your one-stop resource for AI tools and technologies.</p>
        <input type="text" id="searchBar" placeholder="Search for AI tools...">
    </header>
    <main>
        <section id="directory">
            <h2>Featured AI Tools</h2>
            <ul id="toolList"></ul>
        </section>
        <section id="addToolSection">
            <h2>Add a New Tool</h2>
            <input type="text" id="toolName" placeholder="Tool Name" required>
            <input type="text" id="toolDescription" placeholder="Tool Description" required>
            <button id="addToolButton">Add Tool</button>
        </section>
        <section id="about">
            <h2>About This Project</h2>
            <p>This directory showcases various AI tools, enabling users to explore and contribute to a comprehensive list.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 AI Directory. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
