<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,AAABAAEAQIBAAEAABAAAAAAACgAAAAAcAB0AAAAAgAAAAIAAgAAAAAgAAAAAgAAAAAgAAABGAAABAgAAAAAAAAMAAAAAgAAABQAAAADAAAAAgAAABQAAAADAAAAAAFAAAAABQAAAADAAAAAAFAAAAABAAAAAAAABAAAAAAAABAAAAAIAAAAAAgAAAAIAAAADAAAAAgAAABQAAAADAAAAAAFAAAAABQAAAALAAAAAFAAAAABQAAAALAAAAAAAABAAAAAAAABAAAAAIAAAAAAgAAAAIAAAADAAAAAAAAAAAAAAAAMAAAAAgAAABQAAAADAAAAAAFAAAAABQAAAADAAAAAAFAAAAABAAAAAAAABAAAAAAAAGgAAAABAABQAAAALAAAAAAAAGgAAAABAABQAAAABAAAAAIAAAAAAgAAAAIAAAADAAAAAAAAAAAAAAAAMAAAAAgAAABAAAAAAAAGgAAAABAABAAAAAIAAAAAIAAAAAAAAAAAAAAAAAMAAAAAgAAABAAAAAIAAAAAIAAABAAAAAIAAAAAAAAAGgAAAABAABAAAAAIAAAABgAAABQAAAAAAAAMAAAAAgAAABQAAAADAAAAAAFAAAAABQAAAADAAAAAAFAAAAABAAAAAAAABAAAAAAAAGgAAAABAABAAAAAIAAAAAIAAABAAAAAIAAAAAAAAAGgAAAABAABAAAAAIAAAABgAAAADAAAAAAAAAAAAAAAAMAAAAAAAAAAAAAIAAABAAAAAIAAAAAAAAAAAAAAAADAAAAAAACAAAAAIAAAAAIAAAAAAAAAAAAAAAAAMAAAAAgAAABAAAAAIAAAAAAAAAAAAAAIAAAAAAAAAGgAAAABAABAAAAAIAAAAAAAAAAAAAAAABAAAAAIAAAAAAAAAAAAAAAAAMAAAAAAAAAAAAAIAAAAAAAAAAAAAAAAAGgAAAABAABAAAAAIAAAAAAAAAAAAAAIAAAAAAAAAAAAAAAAAMAAAAAAAAAAAAAIAAAAAAAAAAAAAAAAAGgAAAABAABAAAAAIAAAAAAAAAAAAAAIAAAAAAAAAAAAAAAAAMAAAAAAAAAAAAAIAAAAAAAAAAAAAAAAAGgAAAABAABAAAAAIAAAAAAAAAAAAAAIAAAAAAAAAAAAAAAAAMAAAAAAAAAAAAAIAAAAAAAAAAAAAAAAAAAA==">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Pomodoro Timer</h1>
        </header>
        <main class="main">
            <section class="settings">
                <h2>Settings</h2>
                <form class="settings-form">
                    <label for="focus-time">Focus Time:</label>
                    <input type="number" id="focus-time" value="25">
                    <label for="break-time">Break Time:</label>
                    <input type="number" id="break-time" value="5">
                    <label for="num-cycles">Number of Cycles:</label>
                    <input type="number" id="num-cycles" value="4">
                    <button id="save-settings">Save</button>
                </form>
            </section>
            <section class="timer">
                <h2>Timer</h2>
                <p id="timer-status">Time: 00:00:00, Started: false</p>
                <button id="start-timer">Start</button>
                <button id="stop-timer">Stop</button>
                <button id="pause-timer">Pause</button>
                <button id="restart-timer">Restart</button>
                <div class="timer-display">
                    <span id="time-left">00:00:00</span>
                    <span id="time-left-remaining"></span>
                </div>
                <div class="task-tracking">
                    <p id="task-name">Task: </p>
                    <p id="cycle-number">Cycle: 0</p>
                </div>
                <div class="visual-progress">
                    <div class="progress-bar">
                        <span style="width: 0%;"></span>
                    </div>
                </div>
                <div class="sound-cues">
                    <button id="focus-sound">Focus Sound</button>
                    <button id="break-sound">Break Sound</button>
                </div>
            </section>
            <section class="history">
                <h2>History</h2>
                <ul id="history-list"></ul>
            </section>
            <section class="copy-text">
                <button id="copy-task-name">Copy Task Name</button>
                <button id="copy-cycle-number">Copy Cycle Number</button>
            </section>
            <section class="timer-graphic">
                <canvas id="timer-graphic" width="200" height="200"></canvas>
            </section>
        </main>
        <footer class="footer">
            <p>Made with love by your name</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
