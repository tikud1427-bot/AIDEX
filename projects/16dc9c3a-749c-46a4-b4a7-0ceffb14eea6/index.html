<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <button id="save-button" class="button secondary">Save</button>
            <button id="load-button" class="button secondary">Load</button>
        </nav>
        <h1>Website Builder</h1>
    </header>
    <main>
        <div id="sections-container">
            <section id="section-1">
                <h2 id="title-1">Section 1</h2>
                <textarea id="content-1" cols="30" rows="10"></textarea>
            </section>
            <button id="add-section-button" class="button secondary">Add Section</button>
        </div>
        <div id="saved-websites-container">
            <h2 id="title-2">Saved Websites</h2>
            <ul id="saved-websites-list">
            </ul>
        </div>
    </main>
    <footer>
        <p>&copy; 2023</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
