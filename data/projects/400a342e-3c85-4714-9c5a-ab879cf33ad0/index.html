<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Canvas Game</h1>
        <nav>
            <ul>
                <li><a href="#start">Start</a></li>
                <li><a href="#instruction">Instructions</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <canvas id="gameCanvas" aria-label="Game Canvas"></canvas>
        <div id="startScreen" class="screen">
            <h2>Welcome to the Game!</h2>
            <button id="startButton">Press Enter to Start</button>
            <p>Instructions: Avoid the enemies and collect the stars!</p>
        </div>
        <div id="scoreBoard" class="screen hidden">
            <h2>Score: <span id="currentScore">0</span></h2>
        </div>
        <div id="gameOverScreen" class="screen hidden">
            <h2>Game Over</h2>
            <p>Your Score: <span id="finalScore"></span></p>
            <button id="restartButton">Restart</button>
        </div>
    </main>
    <footer>
        <div id="about" class="screen">
            <h2>About This Game</h2>
            <p>This game is a fun way to improve your reflexes and enjoy some entertainment!</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
