<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="game-title">Game Title</h1>
        <button id="start-button">Start Game</button>
    </header>
    <main>
        <section id="game-info">
            <h2 id="game-score">Score: 0</h2>
            <p id="game-level">Level: 1</p>
        </section>
        <section id="game-board">
            <div id="game-grid">
                <!-- game grid will be generated dynamically -->
            </div>
        </section>
        <section id="game-controls">
            <button id="move-up-button">Move Up</button>
            <button id="move-down-button">Move Down</button>
            <button id="move-left-button">Move Left</button>
            <button id="move-right-button">Move Right</button>
        </section>
    </main>
    <footer>
        <p id="game-copyright">&copy; 2023 Game Developers</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
