<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <header class="main-header">
        <h1>Pomodoro Timer</h1>
    </header>
    <div class="main-content">
        <div class="timer-display">
            <span id="minutes">25</span>:<span id="seconds">00</span>
        </div>
        <div class="controls">
            <button id="start-btn">Start</button>
            <button id="pause-btn">Pause</button>
            <button id="reset-btn">Reset</button>
        </div>
        <div class="settings">
            <label for="work-duration">Work Duration (minutes):</label>
            <input type="number" id="work-duration" min="1" max="60" value="25">
            <label for="break-duration">Break Duration (minutes):</label>
            <input type="number" id="break-duration" min="1" max="60" value="5">
        </div>
    </div>
</div>

<script>
    let timer;
    let timeRemaining = 25 * 60;
    let isRunning = false;
    let isWorkTime = true;

    const minutesDisplay = document.getElementById('minutes');
    const secondsDisplay = document.getElementById('seconds');
    const startButton = document.getElementById('start-btn');
    const pauseButton = document.getElementById('pause-btn');
    const resetButton = document.getElementById('reset-btn');
    const workDurationInput = document.getElementById('work-duration');
    const breakDurationInput = document.getElementById('break-duration');

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateTimerDisplay() {
        const [minutes, seconds] = formatTime(timeRemaining).split(':');
        minutesDisplay.textContent = minutes;
        secondsDisplay.textContent = seconds;
    }

    function startTimer() {
        if (!isRunning) {
            isRunning = true;
            timer = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 0) {
                    clearInterval(timer);
                    isWorkTime = !isWorkTime;
                    timeRemaining = (isWorkTime ? workDurationInput.value : breakDurationInput.value) * 60;
                    alert(isWorkTime ? 'Work time!' : 'Break time!');
                    updateTimerDisplay();
                    startTimer();
                }
            }, 1000);
        }
    }

    function pauseTimer() {
        clearInterval(timer);
        isRunning = false;
    }

    function resetTimer() {
        clearInterval(timer);
        isRunning = false;
        isWorkTime = true;
        timeRemaining = workDurationInput.value * 60;
        updateTimerDisplay();
    }

    startButton.addEventListener('click', startTimer);
    pauseButton.addEventListener('click', pauseTimer);
    resetButton.addEventListener('click', resetTimer);

    workDurationInput.addEventListener('change', () => {
        if (!isRunning && isWorkTime) {
            timeRemaining = workDurationInput.value * 60;
            updateTimerDisplay();
        }
    });

    breakDurationInput.addEventListener('change', () => {
        if (!isRunning && !isWorkTime) {
            time
