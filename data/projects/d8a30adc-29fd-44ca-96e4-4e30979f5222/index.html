<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Notes Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Short Notes Generator</h1>
        <textarea id="noteInput" placeholder="Type your notes here..." rows="10"></textarea>
        <button id="generateBtn">Generate Short Note</button>
        <button id="clearBtn">Clear All</button>
        <button id="copyBtn">Copy to Clipboard</button>
        <div id="shortNoteContainer" class="short-note-container"></div>
        <div id="errorMessage" class="error-message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
