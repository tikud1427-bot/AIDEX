<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="time-display">
            <h2 id="minutes">00</h2>
            <span>:</span>
            <h2 id="seconds">00</h2>
        </div>
        <div class="control-panel">
            <div class="selector">
                <div class="option" id="work-option">
                    <label for="work-input">Work time (minutes):</label>
                    <input id="work-input" type="number" value="25">
                </div>
                <div class="option" id="break-option">
                    <label for="break-input">Break time (minutes):</label>
                    <input id="break-input" type="number" value="5">
                </div>
            </div>
            <button class="button" id="start-button">Start</button>
            <button class="button" id="reset-button">Reset</button>
        </div>
        <div class="status-display">
            <p id="status"></p>
        </div>
        <div class="history-display">
            <h3>Session History:</h3>
            <ul id="history-list"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
