<!DOCTYPE html>
<html>
<head>
  <title>Aquiplex Chat</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .bot {
      background: #1e293b;
      align-self: flex-start;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #020617;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type a message..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("msg");
  const message = input.value;

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  fetch("https://ai-directory--tikud1427.replit.app/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  if (data.type === "image") {
    addImage(data.data);
  } else {
    addMessage(data.data, "bot");
  }
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

function addImage(url) {
  const img = document.createElement("img");
  img.src = url;
  img.style.maxWidth = "200px";
  document.getElementById("chat").appendChild(img);
}
</script>

</body>
</html>
